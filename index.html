<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading Dashboard</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; padding: 20px; line-height: 1.25; }
        .dashboard { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        h1 { color: #2c3e50; font-size: 1.5em; text-align: center; }
        .controls { margin-top: 20px; }
        button { padding: 15px; cursor: pointer; border: none; border-radius: 4px; background-color: #3498db; color: white; font-weight: bold; font-size: 1em; width: 100%; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; }
        #toast-container { margin-top: 15px; }
        .toast { padding: 10px; border-radius: 4px; margin-bottom: 5px; font-size: 0.9em; text-align: center; }
        .toast.red { background-color: #e74c3c; color: white; }
        .toast.g { background-color: #27ae60; color: white; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>AI Trading System</h1>
    <div class="controls">
        <button id="auto-trade-btn" onclick="aiAutoTrade()">🤖 AI 자동매수</button>
    </div>
    <div id="toast-container"></div>
</div>

<script>
    const state = {
        api: { key: 'YOUR_KEY', secret: 'YOUR_SECRET', connected: true, mode: 'paper' },
        rules: [],
        ruleId: 0
    };
    const TARGET_SYMS = ['AAPL', 'TSLA', 'NVDA', 'QQQ'];
    const POSSIZE = 1000;

    function showToast(msg, type) {
        const container = document.getElementById('toast-container');
        const div = document.createElement('div');
        div.className = `toast ${type}`;
        div.innerText = msg;
        container.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    async function aiAutoTrade() {
        const btn = document.getElementById('auto-trade-btn');
        btn.disabled = true; 
        btn.textContent = '분석중...';
        
        // 여기에 실제 API 로직 및 필터링 추가
        showToast('✅ 시장 분석 및 전략 적용 완료', 'g');
        
        setTimeout(() => {
            btn.disabled = false;
            btn.textContent = '🤖 AI 자동매수';
        }, 1000);
    }
</script>
</body>
</html>
